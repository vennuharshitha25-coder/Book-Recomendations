<!DOCTYPE html>
<html>
<head>
    <title>Book Recommendation</title>
    <style>
        body {
            font-family: 'Segoe UI';
            background: linear-gradient(to right, #667eea, #764ba2);
            text-align: center;
            color: white;
        }

        h1 {
            margin-top: 20px;
        }

        input, button {
            padding: 12px;
            margin: 10px;
            border-radius: 8px;
            border: none;
            font-size: 16px;
        }

        input {
            width: 250px;
        }

        button {
            background: #ff7e5f;
            color: white;
            cursor: pointer;
        }

        button:hover {
            background: #feb47b;
        }

        #result {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
        }

        .card {
            background: white;
            color: black;
            width: 250px;
            margin: 15px;
            padding: 15px;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        .card h3 {
            color: #764ba2;
        }
    </style>
</head>
<body>

<h1>📚 Book Recommendation App</h1>

<input type="text" id="genre" placeholder="Enter genre (romance, thriller...)">
<button onclick="getBooks()">Search</button>

<div id="result"></div>

<script>
function getBooks() {
    let genre = document.getElementById("genre").value;

    fetch("http://localhost:8081/getBooks?genre=" + genre)
        .then(res => res.json())
        .then(data => {
            let output = "";

            if (data.length === 0) {
                output = "<p>No books found</p>";
            } else {
                data.forEach(book => {
                    output += `
                        <div class="card">
                            <h3>${book.title}</h3>
                            <p><b>Language:</b> ${book.language}</p>
                            <p>${book.story}</p>

                            <p><b>Author:</b> ${book.author}</p>
                        </div>
                    `;
                });
            }

            document.getElementById("result").innerHTML = output;
        });
}
</script>

</body>
</html>
